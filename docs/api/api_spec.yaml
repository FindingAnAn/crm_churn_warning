openapi: 3.0.3
info:
  title: Churn Warning Batch Output Contract
  version: "1.0.0"
  description: |
    The current project does not expose a real-time HTTP prediction API.
    Monthly scoring is executed by Airflow/Kubernetes jobs and writes results
    to PostgreSQL table `data_static.churn_risk_predictions`.

    If an online API is added later, define concrete request/response schemas
    here only after the server implementation exists.
servers: []
paths: {}
components:
  schemas: {}
